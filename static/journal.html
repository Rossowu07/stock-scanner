<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交易簿</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
<style>
:root {
  --green:#1a7a4a;--green-light:#d4f1e4;
  --red:#c0392b;--red-light:#fde8e8;
  --yellow-light:#fef3cd;--yellow-text:#8a6200;
  --bg:#f5f5f3;--card:#fff;
  --border:#e8e8e6;--border-light:#f0f0ee;
  --text:#1a1a1a;--text-2:#555;--text-3:#888;--text-4:#aaa;
  --radius:10px;--radius-sm:7px;--shadow:0 1px 3px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── 頂部 ── */
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10}
.topbar h1{font-size:16px;font-weight:600}
.topbar a{font-size:12px;color:var(--text-3);text-decoration:none;padding:5px 11px;border:1px solid var(--border);border-radius:var(--radius-sm)}

/* ── 主體分割 ── */
.main-split{display:flex;flex:1;overflow:hidden}
.panel-left{width:420px;min-width:320px;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.panel-right{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── 左側頁籤 ── */
.left-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--card);flex-shrink:0}
.ltab{flex:1;padding:10px 6px;font-size:12px;font-weight:500;color:var(--text-3);border-bottom:2px solid transparent;cursor:pointer;text-align:center;white-space:nowrap}
.ltab.active{color:var(--text);border-bottom-color:#3b82f6}
.left-content{flex:1;overflow-y:auto;padding:12px}

/* ── 右側頁籤 ── */
.right-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--card);flex-shrink:0;padding:0 8px}
.rtab{padding:10px 14px;font-size:13px;font-weight:500;color:var(--text-3);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap}
.rtab.active{color:var(--text);border-bottom-color:#3b82f6}
.right-content{flex:1;overflow-y:auto;padding:12px}

/* ── 通用卡片 ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;box-shadow:var(--shadow)}
.card-title{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}
.section-title{font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border-light)}

/* ── 股票資訊面板 ── */
.stock-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.stock-name{font-size:18px;font-weight:700}
.stock-sub{font-size:12px;color:var(--text-3);margin-top:2px}
.stock-price{text-align:right}
.price-big{font-size:22px;font-weight:700}
.price-chg{font-size:13px;font-weight:600;margin-top:2px}
.up{color:var(--green)}.dn{color:var(--red)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.info-item{background:var(--bg);border-radius:var(--radius-sm);padding:8px 10px}
.info-lbl{font-size:10px;color:var(--text-3);margin-bottom:2px}
.info-val{font-size:13px;font-weight:600}
.sig-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.sig-chip{padding:3px 8px;border-radius:8px;font-size:10px;font-weight:600}
.sig-chip.on{background:var(--green-light);color:var(--green)}
.sig-chip.off{background:var(--bg);color:var(--text-3);border:1px solid var(--border-light)}

/* ── 下單表單 ── */
.order-seg{display:flex;background:var(--bg);border-radius:var(--radius-sm);padding:3px;gap:2px;margin-bottom:12px}
.oseg{flex:1;padding:8px;font-size:13px;font-weight:600;border:none;background:transparent;color:var(--text-3);border-radius:6px;cursor:pointer;text-align:center}
.oseg.active{background:var(--card);color:var(--text);box-shadow:var(--shadow)}
.form-row{display:flex;gap:8px;margin-bottom:8px}
.form-field{display:flex;flex-direction:column;gap:4px;flex:1}
.form-field label{font-size:11px;color:var(--text-3);font-weight:500}
.form-field input,.form-field select,.form-field textarea{padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--bg);color:var(--text);outline:none;width:100%}
.form-field input:focus,.form-field select:focus{border-color:var(--green)}
.fee-preview{background:var(--bg);border-radius:var(--radius-sm);padding:8px 10px;font-size:12px;color:var(--text-2);margin-bottom:8px}
.btn-order{width:100%;padding:12px;font-size:15px;font-weight:700;border:none;border-radius:var(--radius-sm);cursor:pointer;letter-spacing:.02em}
.btn-buy{background:var(--green);color:#fff}
.btn-sell{background:var(--red);color:#fff}
.btn-order:disabled{opacity:.4;cursor:not-allowed}
.btn-order:active:not(:disabled){opacity:.85}
.price-shortcuts{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.price-sc{padding:4px 10px;font-size:11px;border:1px solid var(--border);border-radius:6px;cursor:pointer;background:var(--bg);color:var(--text-2)}
.price-sc:hover{border-color:var(--green);color:var(--green)}

/* ── 交易記錄 ── */
.trade-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;margin-bottom:7px}
.trade-card.buy-card{border-left:3px solid var(--green)}
.trade-card.sell-win{border-left:3px solid var(--green)}
.trade-card.sell-loss{border-left:3px solid var(--red)}
.trade-card.bt-card{border-left:3px solid #3b82f6}
.tc-top{display:flex;justify-content:space-between;align-items:flex-start}
.tc-left .tc-name{font-size:14px;font-weight:600}
.tc-left .tc-meta{font-size:11px;color:var(--text-3);margin-top:2px}
.tc-right{text-align:right}
.tc-price{font-size:15px;font-weight:600}
.tc-pnl{font-size:13px;font-weight:600;margin-top:2px}
.tc-pnl.pos{color:var(--green)}.tc-pnl.neg{color:var(--red)}
.tc-badge{display:inline-block;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:600;margin-bottom:3px}
.tc-badge.buy{background:var(--green-light);color:var(--green)}
.tc-badge.sell{background:var(--red-light);color:var(--red)}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text-4);font-size:14px;padding:2px 4px;margin-left:6px}
.del-btn:hover{color:var(--red)}

/* ── 統計 ── */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;text-align:center}
.stat-val{font-size:22px;font-weight:700}
.stat-lbl{font-size:10px;color:var(--text-3);margin-top:2px}

/* ── 回測 ── */
.bt-summary{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:12px}
.bt-box{border:1px solid var(--border-light);border-radius:var(--radius-sm);padding:8px 10px}
.bt-lbl{font-size:10px;color:var(--text-3)}
.bt-val{font-size:16px;font-weight:700;margin-top:2px}
.bt-trade{background:var(--bg);border-radius:var(--radius-sm);padding:8px 10px;margin-bottom:5px;font-size:12px}
.bt-buy-row{border-left:2px solid var(--green)}
.bt-sell-win{border-left:2px solid var(--green)}
.bt-sell-loss{border-left:2px solid var(--red)}
.chk-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
.chk-lbl{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer}

/* ── alert ── */
.alert{padding:8px 12px;border-radius:var(--radius-sm);font-size:12px;margin-bottom:8px}
.alert.ok{background:var(--green-light);color:var(--green)}
.alert.err{background:var(--red-light);color:var(--red)}
.alert.warn{background:var(--yellow-light);color:var(--yellow-text)}
.empty{text-align:center;padding:30px 16px;color:var(--text-3);font-size:13px}
.empty-icon{font-size:28px;display:block;margin-bottom:6px}
.btn-sm{padding:5px 12px;font-size:12px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;background:var(--bg);color:var(--text-2)}
.btn-run{width:100%;padding:10px;font-size:13px;font-weight:600;border:none;border-radius:var(--radius-sm);cursor:pointer;background:var(--text);color:#fff;margin-top:8px}
.equity-wrap{height:160px;position:relative;margin-bottom:8px}
</style>
</head>
<body>

<div class="topbar">
  <h1>📒 交易簿</h1>
  <a href="/">← 回掃描器</a>
</div>

<div class="main-split">
  <!-- ══ 左側：個股資訊 + 下單 ══ -->
  <div class="panel-left">
    <div class="left-tabs">
      <div class="ltab active" onclick="switchLeft('order',this)">📝 下單</div>
      <div class="ltab" onclick="switchLeft('stockinfo',this)">📊 個股資訊</div>
    </div>
    <div class="left-content">

      <!-- 個股資訊卡（始終顯示在下單頁頂部） -->
      <div id="stockInfoCard" style="display:none" class="card">
        <div class="stock-header">
          <div>
            <div class="stock-name" id="si-name">—</div>
            <div class="stock-sub" id="si-code">輸入代號後載入</div>
          </div>
          <div class="stock-price">
            <div class="price-big" id="si-price">—</div>
            <div class="price-chg" id="si-chg">—</div>
          </div>
        </div>
        <div class="info-grid">
          <div class="info-item"><div class="info-lbl">RSI</div><div class="info-val" id="si-rsi">—</div></div>
          <div class="info-item"><div class="info-lbl">量比</div><div class="info-val" id="si-vol">—</div></div>
          <div class="info-item"><div class="info-lbl">MA5/10/20</div><div class="info-val" id="si-ma" style="font-size:11px">—</div></div>
          <div class="info-item"><div class="info-lbl">布林位置</div><div class="info-val" id="si-bb">—</div></div>
        </div>
        <div class="sig-row" id="si-signals"></div>
      </div>

      <!-- 下單表單 -->
      <div id="lpage-order">
        <div id="alertOrder" style="display:none"></div>
        <div class="order-seg">
          <button class="oseg active" id="oseg-buy" onclick="setAction('buy',this)">買入</button>
          <button class="oseg" id="oseg-sell" onclick="setAction('sell',this)">賣出</button>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label>股票代號</label>
            <input id="m-code" type="text" placeholder="例：2330" maxlength="6" oninput="onCodeInput()">
          </div>
          <div class="form-field">
            <label>名稱</label>
            <input id="m-name" type="text" placeholder="自動填入">
          </div>
        </div>
        <div style="margin-bottom:8px">
          <div style="font-size:11px;color:var(--text-3);margin-bottom:5px">快速價格</div>
          <div class="price-shortcuts">
            <button class="price-sc" onclick="setPriceFromRef('close')" id="sc-close">收盤 —</button>
            <button class="price-sc" onclick="setPriceFromRef('open')" id="sc-open">開盤 —</button>
            <button class="price-sc" onclick="setPriceFromRef('high')" id="sc-high">最高 —</button>
            <button class="price-sc" onclick="setPriceFromRef('low')" id="sc-low">最低 —</button>
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label>成交價格（元）</label>
            <input id="m-price" type="number" placeholder="0.00" step="0.01" min="0" oninput="previewFee()">
          </div>
          <div class="form-field">
            <label>張數</label>
            <input id="m-shares" type="number" value="1" min="1" oninput="previewFee()">
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label>交易日期</label>
            <input id="m-date" type="date">
          </div>
          <div class="form-field" id="close-id-wrap" style="display:none">
            <label>對應買入單</label>
            <select id="m-close-id"><option value="">— 選擇 —</option></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label>備注</label>
            <input id="m-note" type="text" placeholder="訊號/理由">
          </div>
        </div>
        <div id="fee-preview" class="fee-preview" style="display:none"></div>
        <button class="btn-order btn-buy" id="orderBtn" onclick="submitTrade()">確認買入</button>
      </div>

      <!-- 個股詳細資訊頁 -->
      <div id="lpage-stockinfo" style="display:none">
        <div class="empty"><span class="empty-icon">🔍</span>在下單頁輸入代號後自動載入</div>
      </div>
    </div>
  </div>

  <!-- ══ 右側：記錄/回測/統計 ══ -->
  <div class="panel-right">
    <div class="right-tabs">
      <div class="rtab active" onclick="switchRight('trades',this)">📋 交易記錄</div>
      <div class="rtab" onclick="switchRight('backtest',this)">🔬 歷史回測</div>
      <div class="rtab" onclick="switchRight('stats',this)">📊 績效統計</div>
    </div>
    <div class="right-content">

      <!-- 交易記錄 -->
      <div id="rpage-trades">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="font-size:13px;font-weight:600">所有交易</div>
          <select id="filterStatus" onchange="renderTrades()" class="btn-sm" style="padding:5px 8px">
            <option value="all">全部</option>
            <option value="open">持倉中</option>
            <option value="closed">已平倉</option>
            <option value="backtest">回測</option>
          </select>
        </div>
        <div id="tradesList"></div>
      </div>

      <!-- 歷史回測 -->
      <div id="rpage-backtest" style="display:none">
        <div class="card">
          <div class="card-title">回測設定</div>
          <div id="alertBt" style="display:none"></div>
          <div class="form-row">
            <div class="form-field"><label>股票代號</label><input id="bt-code" type="text" placeholder="例：2330"></div>
            <div class="form-field"><label>張數</label><input id="bt-shares" type="number" value="1" min="1"></div>
          </div>
          <div class="form-row">
            <div class="form-field"><label>開始日期</label><input id="bt-start" type="date"></div>
            <div class="form-field"><label>結束日期</label><input id="bt-end" type="date"></div>
          </div>
          <div class="form-row">
            <div class="form-field"><label>停損 %</label><input id="bt-sl" type="number" value="7" step="0.5"></div>
            <div class="form-field"><label>停利 %</label><input id="bt-tp" type="number" value="15" step="0.5"></div>
          </div>
          <div style="font-size:11px;color:var(--text-3);margin-bottom:6px;font-weight:600">買入觸發條件</div>
          <div class="chk-grid">
            <label class="chk-lbl"><input type="checkbox" id="bt-pb" checked>價格突破</label>
            <label class="chk-lbl"><input type="checkbox" id="bt-vs" checked>量能放大</label>
            <label class="chk-lbl"><input type="checkbox" id="bt-mp" checked>MACD正值</label>
            <label class="chk-lbl"><input type="checkbox" id="bt-rs">RSI強勢</label>
            <label class="chk-lbl"><input type="checkbox" id="bt-ma" checked>均線多頭</label>
          </div>
          <div class="form-row" style="margin-top:8px">
            <div class="form-field"><label>最少符合幾個條件</label><input id="bt-min" type="number" value="3" min="1" max="5"></div>
          </div>
          <label class="chk-lbl" style="margin-top:6px"><input type="checkbox" id="bt-save">存入交易簿</label>
          <button class="btn-run" id="btBtn" onclick="runBacktest()">▶ 開始回測</button>
        </div>
        <div id="btResult" style="display:none">
          <div class="card">
            <div class="card-title" id="btTitle">回測結果</div>
            <div class="bt-summary" id="btSummary"></div>
            <div style="font-size:11px;color:var(--text-3);margin-bottom:6px">資金曲線</div>
            <div class="equity-wrap"><canvas id="equityChart"></canvas></div>
          </div>
          <div class="card">
            <div class="card-title">交易明細</div>
            <div id="btTrades"></div>
          </div>
        </div>
      </div>

      <!-- 績效統計 -->
      <div id="rpage-stats" style="display:none">
        <div class="stats-grid">
          <div class="stat-box"><div class="stat-val" id="st-total">—</div><div class="stat-lbl">總交易次數</div></div>
          <div class="stat-box"><div class="stat-val" id="st-wr" style="color:var(--green)">—</div><div class="stat-lbl">勝率</div></div>
          <div class="stat-box"><div class="stat-val" id="st-pnl">—</div><div class="stat-lbl">總損益（元）</div></div>
          <div class="stat-box"><div class="stat-val" id="st-rr">—</div><div class="stat-lbl">盈虧比</div></div>
        </div>
        <div class="card">
          <div class="card-title">詳細統計</div>
          <div id="statsDetail"></div>
        </div>
        <div class="card">
          <div class="card-title">持倉中</div>
          <div id="openTrades"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// ── 狀態 ──────────────────────────────────────────────
const TOKEN_KEY  = 'finmind_token_v1';
let currentAction = 'buy';
let allTrades     = [];
let equityInst    = null;
let refPrices     = {};   // 暫存當前代號的參考價格
let currentScanResult = null; // 從掃描器帶過來的個股資料

// ── 初始化 ────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  // 設定今日日期
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('m-date').value  = today;
  document.getElementById('bt-end').value  = today;
  const sixAgo = new Date(); sixAgo.setMonth(sixAgo.getMonth()-6);
  document.getElementById('bt-start').value = sixAgo.toISOString().slice(0,10);

  // 嘗試從 URL 帶入掃描器選定的個股
  const params = new URLSearchParams(location.search);
  const preCode = params.get('code');
  const preName = params.get('name');
  if (preCode) {
    document.getElementById('m-code').value = preCode;
    if (preName) document.getElementById('m-name').value = decodeURIComponent(preName);
    await loadStockInfo(preCode);
  }

  await loadAllTrades();
  renderTrades();
  loadStats();
});

function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }

// ── 頁籤切換 ──────────────────────────────────────────
function switchLeft(id, btn) {
  ['order','stockinfo'].forEach(p => {
    document.getElementById('lpage-'+p).style.display = p===id ? 'block' : 'none';
  });
  document.querySelectorAll('.ltab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function switchRight(id, btn) {
  ['trades','backtest','stats'].forEach(p => {
    document.getElementById('rpage-'+p).style.display = p===id ? 'block' : 'none';
  });
  document.querySelectorAll('.rtab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (id==='stats')  loadStats();
  if (id==='trades') renderTrades();
}

// ── 代號輸入 → 載入個股資訊 ──────────────────────────
let codeTimer = null;
function onCodeInput() {
  clearTimeout(codeTimer);
  const code = document.getElementById('m-code').value.trim();
  if (code.length >= 4) {
    codeTimer = setTimeout(() => loadStockInfo(code), 600);
  }
  if (currentAction === 'sell') populateBuyOptions();
}

async function loadStockInfo(code) {
  const token = getToken();
  if (!token) return;
  try {
    const r = await fetch(`/api/chart/${code}?token=${encodeURIComponent(token)}`);
    if (!r.ok) return;
    const d = await r.json();
    if (!d.close || !d.close.length) return;

    const n      = d.close.length - 1;
    const price  = d.close[n];
    const prev   = d.close[n-1] || price;
    const chgPct = ((price-prev)/prev*100).toFixed(2);
    const high   = d.high[n];
    const low    = d.low[n];
    const open   = d.open[n];
    const vol    = d.vol[n];
    const volAvg = d.vol.slice(-20).reduce((a,b)=>a+(b||0),0)/20;

    refPrices = { close: price, open, high, low };

    // 計算簡單指標
    const closes = d.close.filter(v=>v!=null);
    const ma5    = avg(closes.slice(-5));
    const ma10   = avg(closes.slice(-10));
    const ma20   = avg(closes.slice(-20));
    const volRatio = volAvg > 0 ? (vol/volAvg).toFixed(1) : '—';

    // 布林位置
    const bb_mid = ma20;
    const bb_std = std(closes.slice(-20));
    const bb_up  = bb_mid + 2*bb_std;
    const bb_lo  = bb_mid - 2*bb_std;
    const bb_pos = bb_up > bb_lo ? Math.round((price-bb_lo)/(bb_up-bb_lo)*100) : 50;

    // RSI
    const rsiVal = calcRSI(closes);

    // 訊號
    const sigs = {
      '價格突破': price >= Math.max(...d.high.slice(-20).filter(v=>v)) * 0.97,
      '量能放大': parseFloat(volRatio) >= 1.5,
      'MACD正值': (() => { const h=calcMACD(closes); return h[h.length-1]>0; })(),
      'RSI強勢':  rsiVal>=55 && rsiVal<=75,
      '均線多頭': ma5>ma10 && ma10>ma20,
    };

    // 更新 UI
    document.getElementById('si-name').textContent  = code;
    document.getElementById('si-code').textContent  = d.dates ? d.dates[n] : '';
    document.getElementById('si-price').textContent = price.toFixed(2);
    const chgEl = document.getElementById('si-chg');
    chgEl.textContent = (chgPct>=0?'+':'')+chgPct+'%';
    chgEl.className = 'price-chg ' + (chgPct>=0?'up':'dn');
    document.getElementById('si-rsi').textContent = rsiVal.toFixed(1);
    document.getElementById('si-vol').textContent = volRatio+'x';
    document.getElementById('si-ma').textContent  = `${ma5.toFixed(0)}/${ma10.toFixed(0)}/${ma20.toFixed(0)}`;
    document.getElementById('si-bb').textContent  = bb_pos+'%';
    document.getElementById('si-signals').innerHTML = Object.entries(sigs)
      .map(([k,v])=>`<span class="sig-chip ${v?'on':'off'}">${k}</span>`).join('');
    document.getElementById('stockInfoCard').style.display = 'block';

    // 更新快速價格按鈕
    document.getElementById('sc-close').textContent = `收盤 ${price.toFixed(2)}`;
    document.getElementById('sc-open').textContent  = `開盤 ${open?.toFixed(2)||'—'}`;
    document.getElementById('sc-high').textContent  = `最高 ${high?.toFixed(2)||'—'}`;
    document.getElementById('sc-low').textContent   = `最低 ${low?.toFixed(2)||'—'}`;

    // 自動填入收盤價
    if (!document.getElementById('m-price').value) {
      document.getElementById('m-price').value = price.toFixed(2);
      previewFee();
    }
  } catch(e) {
    console.warn('[stockinfo]', e.message);
  }
}

function setPriceFromRef(type) {
  const p = refPrices[type];
  if (p) { document.getElementById('m-price').value = p.toFixed(2); previewFee(); }
}

// ── 技術指標計算（前端輕量版）────────────────────────
function avg(arr) { return arr.reduce((a,b)=>a+(b||0),0)/arr.length; }
function std(arr) {
  const m = avg(arr);
  return Math.sqrt(arr.reduce((a,b)=>a+(b-m)**2,0)/arr.length);
}
function calcRSI(closes, period=14) {
  if (closes.length < period+1) return 50;
  let g=0,l=0;
  for (let i=closes.length-period; i<closes.length; i++) {
    const d = closes[i]-closes[i-1];
    if (d>0) g+=d; else l-=d;
  }
  const rs = (g/period)/((l/period)||1e-9);
  return 100-100/(1+rs);
}
function calcMACD(closes) {
  const ema = (data,span) => {
    const k=2/(span+1); const out=[data[0]];
    for (let i=1;i<data.length;i++) out.push(data[i]*k+out[i-1]*(1-k));
    return out;
  };
  const e12=ema(closes,12),e26=ema(closes,26);
  const ml=e12.map((v,i)=>v-e26[i]);
  const sig=ema(ml,9);
  return ml.map((v,i)=>v-sig[i]);
}

// ── 下單 ──────────────────────────────────────────────
function setAction(action, btn) {
  currentAction = action;
  document.querySelectorAll('.oseg').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const ob = document.getElementById('orderBtn');
  ob.textContent = action==='buy' ? '確認買入' : '確認賣出';
  ob.className   = `btn-order btn-${action}`;
  document.getElementById('close-id-wrap').style.display = action==='sell' ? 'flex' : 'none';
  if (action==='sell') populateBuyOptions();
  previewFee();
}

function populateBuyOptions() {
  const code = document.getElementById('m-code').value.trim();
  const sel  = document.getElementById('m-close-id');
  const open = allTrades.filter(t=>t.action==='buy'&&t.status==='open'&&(!code||t.code===code));
  sel.innerHTML = '<option value="">— 選擇買入單 —</option>' +
    open.map(t=>`<option value="${t.id}">[${t.date}] ${t.code} @${t.price} ×${t.shares}張</option>`).join('');
}

function previewFee() {
  const price  = parseFloat(document.getElementById('m-price').value)||0;
  const shares = parseInt(document.getElementById('m-shares').value)||0;
  const isSell = currentAction==='sell';
  const el = document.getElementById('fee-preview');
  if (!price||!shares) { el.style.display='none'; return; }
  const amt = price*shares*1000;
  const fee = Math.max(Math.round(amt*0.001425),20);
  const tax = isSell ? Math.round(amt*0.003) : 0;
  const net = isSell ? amt-fee-tax : amt+fee;
  el.style.display = 'block';
  el.innerHTML = `成交金額 <b>${amt.toLocaleString()}</b> ／ 手續費 <b>${fee.toLocaleString()}</b>`+
    (isSell?` ／ 交易稅 <b>${tax.toLocaleString()}</b>`:'')+
    ` ／ 實付 <b>${net.toLocaleString()}</b> 元`;
}

async function submitTrade() {
  const code   = document.getElementById('m-code').value.trim();
  const name   = document.getElementById('m-name').value.trim()||code;
  const price  = parseFloat(document.getElementById('m-price').value);
  const shares = parseInt(document.getElementById('m-shares').value);
  const date   = document.getElementById('m-date').value;
  const note   = document.getElementById('m-note').value.trim();
  const closeId= parseInt(document.getElementById('m-close-id').value)||null;
  if (!code||!price||!shares||!date) { showAlert('alertOrder','請填寫代號、價格、張數、日期','err'); return; }
  const btn = document.getElementById('orderBtn');
  btn.disabled = true;
  try {
    const r = await fetch('/api/journal/trade', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({code,name,action:currentAction,price,shares,date,note,
                            trigger:'manual',close_id:currentAction==='sell'?closeId:null})
    });
    if (!r.ok) throw new Error((await r.json()).detail||'API錯誤');
    const t = await r.json();
    const msg = `✅ ${currentAction==='buy'?'買入':'賣出'} ${code} ${shares}張 @${price}`+
      (t.pnl!=null?` ／ 損益 ${t.pnl>=0?'+':''}${t.pnl?.toLocaleString()} 元（${t.pnl_pct}%）`:'');
    showAlert('alertOrder', msg, t.pnl<0?'err':'ok');
    document.getElementById('m-price').value='';
    document.getElementById('m-note').value='';
    document.getElementById('fee-preview').style.display='none';
    await loadAllTrades();
    renderTrades();
    loadStats();
  } catch(e) {
    showAlert('alertOrder','提交失敗：'+e.message,'err');
  } finally { btn.disabled=false; }
}

// ── 交易記錄 ─────────────────────────────────────────
async function loadAllTrades() {
  try {
    const r = await fetch('/api/journal/trades');
    if (!r.ok) throw new Error('載入失敗');
    const d = await r.json();
    allTrades = (d.trades||[]).slice().reverse();
  } catch(e) {
    console.error('[trades]', e.message);
    allTrades = [];
  }
}

function renderTrades() {
  const filter = document.getElementById('filterStatus').value;
  let list = allTrades;
  if (filter==='open')     list=list.filter(t=>t.status==='open'&&t.trigger!=='backtest');
  if (filter==='closed')   list=list.filter(t=>t.status==='closed'&&t.trigger!=='backtest');
  if (filter==='backtest') list=list.filter(t=>t.trigger==='backtest');
  const c = document.getElementById('tradesList');
  if (!list.length) { c.innerHTML='<div class="empty"><span class="empty-icon">📋</span>尚無交易記錄</div>'; return; }
  c.innerHTML = list.map(t => {
    const isBuy = t.action==='buy';
    const isWin = t.pnl>0;
    const cls   = t.trigger==='backtest'?'bt-card':isBuy?'buy-card':isWin?'sell-win':'sell-loss';
    const sigs  = (t.signals||[]).map(s=>`<span style="font-size:10px;background:var(--green-light);color:var(--green);padding:1px 5px;border-radius:4px;margin-right:3px">${s}</span>`).join('');
    return `<div class="trade-card ${cls}">
      <div class="tc-top">
        <div class="tc-left">
          <span class="tc-badge ${isBuy?'buy':'sell'}">${isBuy?'買入':'賣出'}</span>
          <div class="tc-name">${t.code} ${t.name||''}</div>
          <div class="tc-meta">${t.date}${t.trigger==='backtest'?' ・回測':''}${t.exit_reason?' ・'+t.exit_reason:''}</div>
          ${sigs?`<div style="margin-top:4px">${sigs}</div>`:''}
          ${t.note?`<div style="font-size:11px;color:var(--text-3);margin-top:3px">📝 ${t.note}</div>`:''}
        </div>
        <div class="tc-right">
          <div class="tc-price">${parseFloat(t.price).toLocaleString()} 元</div>
          <div style="font-size:11px;color:var(--text-3)">${t.shares}張</div>
          ${t.pnl!=null?`<div class="tc-pnl ${t.pnl>=0?'pos':'neg'}">${t.pnl>=0?'+':''}${Math.round(t.pnl).toLocaleString()}<br><span style="font-size:10px">${t.pnl_pct}%</span></div>`:''}
          <button class="del-btn" onclick="deleteTrade(${t.id})">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function deleteTrade(id) {
  if (!confirm('確定刪除？')) return;
  await fetch(`/api/journal/trade/${id}`,{method:'DELETE'});
  await loadAllTrades(); renderTrades(); loadStats();
}

// ── 歷史回測 ─────────────────────────────────────────
async function runBacktest() {
  const token = getToken();
  if (!token) { showAlert('alertBt','請先在掃描器登入 Token','err'); return; }
  const code  = document.getElementById('bt-code').value.trim();
  const start = document.getElementById('bt-start').value;
  const end   = document.getElementById('bt-end').value;
  if (!code||!start||!end) { showAlert('alertBt','請填寫代號和日期','err'); return; }
  const btn = document.getElementById('btBtn');
  btn.disabled=true; btn.textContent='回測中...';
  document.getElementById('btResult').style.display='none';
  try {
    const body = {
      token, code,
      start_date:start, end_date:end,
      shares:    parseInt(document.getElementById('bt-shares').value)||1,
      stop_loss: parseFloat(document.getElementById('bt-sl').value)||7,
      take_profit:parseFloat(document.getElementById('bt-tp').value)||15,
      need_price_breakout:document.getElementById('bt-pb').checked,
      need_volume_surge:  document.getElementById('bt-vs').checked,
      need_macd_positive: document.getElementById('bt-mp').checked,
      need_rsi_strong:    document.getElementById('bt-rs').checked,
      need_ma_bullish:    document.getElementById('bt-ma').checked,
      min_signals:parseInt(document.getElementById('bt-min').value)||3,
    };
    const r = await fetch('/api/backtest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if (!r.ok) { const e=await r.json(); throw new Error(e.detail||'錯誤'); }
    const d = await r.json();
    renderBtResult(d);
    if (document.getElementById('bt-save').checked && d.trades.length) {
      for (const t of d.trades) {
        await fetch('/api/journal/trade',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({code:t.code,name:t.code,action:t.type,price:t.price,
            shares:t.shares,date:t.date,trigger:'backtest',signals:t.signals||[],
            note:t.exit_reason||'',close_id:null})});
      }
      await loadAllTrades(); renderTrades();
      showAlert('alertBt',`✅ ${d.trades.length} 筆回測交易已存入交易簿`,'ok');
    }
  } catch(e) {
    showAlert('alertBt','回測失敗：'+e.message,'err');
  } finally { btn.disabled=false; btn.textContent='▶ 開始回測'; }
}

function renderBtResult(d) {
  document.getElementById('btTitle').textContent = `${d.code}（${d.start_date}～${d.end_date}）`;
  const pc = d.total_pnl>=0?'color:var(--green)':'color:var(--red)';
  document.getElementById('btSummary').innerHTML = [
    ['交易次數',d.total_trades,''],
    ['勝率',d.win_rate+'%',d.win_rate>=50?'color:var(--green)':'color:var(--red)'],
    ['總損益',(d.total_pnl>=0?'+':'')+d.total_pnl.toLocaleString()+'元',pc],
    ['平均持有',d.avg_hold_days+'天',''],
    ['最大獲利','+'+d.max_win.toLocaleString(),'color:var(--green)'],
    ['最大虧損',d.max_loss.toLocaleString(),'color:var(--red)'],
    ['獲利次數',d.wins,'color:var(--green)'],
    ['虧損次數',d.losses,'color:var(--red)'],
  ].map(([l,v,c])=>`<div class="bt-box"><div class="bt-lbl">${l}</div><div class="bt-val" style="${c}">${v}</div></div>`).join('');

  // 資金曲線
  const sells = d.trades.filter(t=>t.type==='sell');
  if (sells.length) {
    let cum=0;
    if (equityInst) equityInst.destroy();
    equityInst = new Chart(document.getElementById('equityChart').getContext('2d'),{
      type:'line',
      data:{labels:sells.map(t=>t.date),
            datasets:[{data:sells.map(t=>{cum+=t.pnl;return cum;}),
                       borderColor:cum>=0?'#1a7a4a':'#c0392b',borderWidth:1.5,
                       pointRadius:2,fill:true,
                       backgroundColor:cum>=0?'rgba(26,122,74,.08)':'rgba(192,57,43,.08)',
                       tension:.3}]},
      options:{responsive:true,maintainAspectRatio:false,
               plugins:{legend:{display:false}},
               scales:{x:{ticks:{font:{size:9},color:'#888'},grid:{display:false}},
                       y:{ticks:{font:{size:9},color:'#888',
                          callback:v=>v>=0?'+'+v.toLocaleString():v.toLocaleString()},
                          grid:{color:'rgba(0,0,0,0.04)'}}}}});
  }

  const sells2 = d.trades.filter(t=>t.type==='sell');
  document.getElementById('btTrades').innerHTML = !sells2.length
    ? '<div class="empty"><span class="empty-icon">🔍</span>此區間無觸發訊號</div>'
    : sells2.map(t=>`<div class="bt-trade ${t.pnl>0?'bt-sell-win':'bt-sell-loss'}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>買入 ${t.buy_date} @${t.buy_price} → 賣出 ${t.date} @${t.price}
            <span style="font-size:10px;color:var(--text-3);margin-left:4px">${t.exit_reason}</span>
          </div>
          <div style="font-weight:600;text-align:right;${t.pnl>0?'color:var(--green)':'color:var(--red)'}">
            ${t.pnl>=0?'+':''}${t.pnl.toLocaleString()}<br>
            <span style="font-size:10px">${t.pnl_pct}% ・${t.hold_days}天</span>
          </div>
        </div>
      </div>`).join('');

  document.getElementById('btResult').style.display='block';
}

// ── 績效統計 ─────────────────────────────────────────
async function loadStats() {
  try {
    const r = await fetch('/api/journal/stats');
    if (!r.ok) throw new Error();
    const s = await r.json();
    document.getElementById('st-total').textContent = s.total_trades;
    document.getElementById('st-wr').textContent    = s.win_rate+'%';
    const pe = document.getElementById('st-pnl');
    pe.textContent = (s.total_pnl>=0?'+':'')+s.total_pnl.toLocaleString();
    pe.style.color = s.total_pnl>=0?'var(--green)':'var(--red)';
    document.getElementById('st-rr').textContent = s.rr_ratio+'x';
    document.getElementById('statsDetail').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px">
        <div style="padding:8px;background:var(--bg);border-radius:6px">獲利次數<br><strong style="color:var(--green)">${s.wins}次</strong></div>
        <div style="padding:8px;background:var(--bg);border-radius:6px">虧損次數<br><strong style="color:var(--red)">${s.losses}次</strong></div>
        <div style="padding:8px;background:var(--bg);border-radius:6px">平均獲利<br><strong style="color:var(--green)">+${s.avg_win.toLocaleString()}元</strong></div>
        <div style="padding:8px;background:var(--bg);border-radius:6px">平均虧損<br><strong style="color:var(--red)">${s.avg_loss.toLocaleString()}元</strong></div>
      </div>
      <div style="margin-top:8px;font-size:11px;color:var(--text-3)">盈虧比 ${s.rr_ratio}x：建議 ≥ 1.5x</div>`;
    const open = allTrades.filter(t=>t.status==='open'&&t.trigger!=='backtest');
    document.getElementById('openTrades').innerHTML = !open.length
      ? '<div style="font-size:13px;color:var(--text-3)">目前無持倉</div>'
      : open.map(t=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border-light);font-size:12px">
          <div><strong>${t.code} ${t.name||''}</strong><br><span style="color:var(--text-3)">${t.date} @${t.price} ×${t.shares}張</span></div>
          <div style="color:var(--text-3)">成本 ${Math.round(t.price*t.shares*1000+t.fee).toLocaleString()}元</div>
        </div>`).join('');
  } catch(e) { console.error('[stats]', e.message); }
}

// ── 工具 ─────────────────────────────────────────────
function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.display='block';
  el.className='alert '+type;
  el.textContent=msg;
  setTimeout(()=>el.style.display='none', 5000);
}
