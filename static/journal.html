<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交易簿</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
<script src="/static/lc.js" onerror="this.onerror=null;this.src='https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js'"></script>
<style>
:root {
  --green:#1a7a4a;--green-light:#d4f1e4;
  --red:#c0392b;--red-light:#fde8e8;
  --yellow-light:#fef3cd;--yellow-text:#8a6200;
  --bg:#f5f5f3;--card:#fff;
  --border:#e8e8e6;--border-light:#f0f0ee;
  --text:#1a1a1a;--text-2:#555;--text-3:#888;--text-4:#aaa;
  --radius:10px;--radius-sm:7px;--shadow:0 1px 3px rgba(0,0,0,.08);
  --topbar-h:48px;--bottomnav-h:52px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
     background:var(--bg);color:var(--text);font-size:14px;
     height:100vh;overflow:hidden}

/* ── 頂部 ── */
.topbar{position:fixed;top:0;left:0;right:0;
        height:var(--topbar-h);background:var(--card);border-bottom:1px solid var(--border);
        padding:0 16px;display:flex;align-items:center;justify-content:space-between;
        z-index:20}
.topbar h1{font-size:16px;font-weight:600}
.topbar a{font-size:12px;color:var(--text-3);text-decoration:none;
          padding:5px 11px;border:1px solid var(--border);border-radius:var(--radius-sm)}

/* ── 主體：左右各半 ── */
.main-area{
  position:fixed;
  top:var(--topbar-h);
  left:0;
  right:0;
  bottom:var(--bottomnav-h);
  display:flex;
  overflow:hidden;
}

.half{flex:1;display:flex;flex-direction:column;overflow:hidden;
      border-right:1px solid var(--border)}
.half:last-child{border-right:none}
.half-title{font-size:11px;font-weight:600;color:var(--text-3);
            text-transform:uppercase;letter-spacing:.05em;
            padding:10px 14px 8px;background:var(--card);
            border-bottom:1px solid var(--border-light);flex-shrink:0}
.half-body{flex:1;overflow-y:auto;padding:12px 12px 8px;
           -webkit-overflow-scrolling:touch}
.half-footer{flex-shrink:0;padding:8px 12px;
             border-top:1px solid var(--border-light);
             background:var(--card)}

/* ── 個股資訊面板 ── */
.si-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.si-name{font-size:20px;font-weight:700}
.si-date{font-size:11px;color:var(--text-3);margin-top:2px}
.si-price-wrap{text-align:right}
.si-price{font-size:24px;font-weight:700}
.si-chg{font-size:13px;font-weight:600;margin-top:2px}
.up{color:var(--green)}.dn{color:var(--red)}

.si-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.si-item{background:var(--bg);border-radius:var(--radius-sm);padding:8px 10px}
.si-lbl{font-size:10px;color:var(--text-3);margin-bottom:2px}
.si-val{font-size:13px;font-weight:600}

.sig-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.sig-chip{padding:3px 8px;border-radius:8px;font-size:11px;font-weight:600}
.sig-chip.on{background:var(--green-light);color:var(--green)}
.sig-chip.off{background:var(--bg);color:var(--text-3);border:1px solid var(--border-light)}

.ohlc-row{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:10px}
.ohlc-item{background:var(--bg);border-radius:6px;padding:6px 8px;text-align:center}
.ohlc-lbl{font-size:9px;color:var(--text-3)}
.ohlc-val{font-size:12px;font-weight:600;margin-top:1px}

/* ── 盤中走勢圖 ── */
.intraday-section{margin-top:10px;padding-top:10px;border-top:1px solid var(--border-light)}
.intraday-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.intraday-title{font-size:11px;font-weight:600;color:var(--text-3)}
.intraday-meta{font-size:10px;color:var(--text-3)}
.intraday-chart-wrap{position:relative;width:100%;height:130px}
.intraday-vol-wrap{position:relative;width:100%;height:50px;margin-top:4px}
.intraday-loading{text-align:center;padding:20px;font-size:12px;color:var(--text-3)}
.si-empty{text-align:center;padding:40px 20px;color:var(--text-3)}
.si-empty-icon{font-size:36px;display:block;margin-bottom:10px}

/* ── 下單表單 ── */
.order-seg{display:flex;background:var(--bg);border-radius:var(--radius-sm);
           padding:3px;gap:2px;margin-bottom:12px}
.oseg{flex:1;padding:9px;font-size:14px;font-weight:600;border:none;
      background:transparent;color:var(--text-3);border-radius:6px;
      cursor:pointer;text-align:center}
.oseg.active{background:var(--card);color:var(--text);box-shadow:var(--shadow)}

.form-row{display:flex;gap:8px;margin-bottom:8px}
.ff{display:flex;flex-direction:column;gap:4px;flex:1}
.ff label{font-size:11px;color:var(--text-3);font-weight:500}
.ff input,.ff select{padding:9px 10px;border:1px solid var(--border);
  border-radius:var(--radius-sm);font-size:13px;background:var(--bg);
  color:var(--text);outline:none;width:100%}
.ff input:focus,.ff select:focus{border-color:var(--green)}

.price-sc-wrap{margin-bottom:8px}
.price-sc-label{font-size:10px;color:var(--text-3);margin-bottom:4px}
.price-sc-row{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.psc{padding:6px 4px;font-size:11px;font-weight:500;border:1px solid var(--border);
     border-radius:6px;cursor:pointer;background:var(--bg);color:var(--text-2);
     text-align:center;line-height:1.3}
.psc:hover{border-color:var(--green);color:var(--green)}
.psc .psc-lbl{font-size:9px;color:var(--text-3)}
.psc .psc-val{font-size:12px;font-weight:600}

.fee-box{background:var(--bg);border-radius:var(--radius-sm);
         padding:8px 10px;font-size:11px;color:var(--text-2);margin-bottom:10px}

.btn-order{width:100%;padding:13px;font-size:16px;font-weight:700;
           border:none;border-radius:var(--radius-sm);cursor:pointer}
.btn-buy{background:var(--green);color:#fff}
.btn-sell{background:var(--red);color:#fff}
.btn-order:disabled{opacity:.4;cursor:not-allowed}
.btn-order:active:not(:disabled){opacity:.85}

/* ── 底部導覽 ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--bottomnav-h);
            background:var(--card);border-top:1px solid var(--border);
            display:flex;z-index:30}
.bnav{flex:1;display:flex;flex-direction:column;align-items:center;
      justify-content:center;gap:2px;cursor:pointer;
      font-size:10px;color:var(--text-3);font-weight:500;border:none;
      background:transparent;padding:6px 4px}
.bnav.active{color:var(--green)}
.bnav-icon{font-size:18px;line-height:1}

/* ── 抽屜 ── */
.drawer{position:fixed;left:0;right:0;bottom:var(--bottomnav-h);
        background:var(--card);border-top:1px solid var(--border);
        border-radius:16px 16px 0 0;
        box-shadow:0 -4px 20px rgba(0,0,0,.12);
        transform:translateY(100%);
        transition:transform .3s cubic-bezier(.4,0,.2,1);
        z-index:25;display:flex;flex-direction:column;
        max-height:calc(100vh - var(--topbar-h) - var(--bottomnav-h))}
.drawer.open{transform:translateY(0)}
.drawer-handle{width:36px;height:4px;background:var(--border);
               border-radius:2px;margin:10px auto 0;flex-shrink:0}
.drawer-header{display:flex;justify-content:space-between;align-items:center;
               padding:10px 16px 8px;flex-shrink:0}
.drawer-title{font-size:15px;font-weight:600}
.drawer-close{background:none;border:none;font-size:20px;color:var(--text-3);
              cursor:pointer;padding:0 2px;line-height:1}
.drawer-body{flex:1;overflow-y:auto;padding:12px 14px 20px;
             -webkit-overflow-scrolling:touch}

/* ── 交易卡片 ── */
.trade-card{background:var(--card);border:1px solid var(--border);
            border-radius:var(--radius);padding:10px 12px;margin-bottom:7px}
.tc-buy{border-left:3px solid var(--green)}
.tc-sell-win{border-left:3px solid var(--green)}
.tc-sell-loss{border-left:3px solid var(--red)}
.tc-bt{border-left:3px solid #3b82f6}
.tc-top{display:flex;justify-content:space-between;align-items:flex-start}
.tc-name{font-size:14px;font-weight:600}
.tc-meta{font-size:11px;color:var(--text-3);margin-top:2px}
.tc-price{font-size:14px;font-weight:600;text-align:right}
.tc-pnl{font-size:12px;font-weight:600;text-align:right;margin-top:2px}
.tc-pnl.pos{color:var(--green)}.tc-pnl.neg{color:var(--red)}
.tc-badge{display:inline-block;padding:1px 6px;border-radius:5px;
          font-size:10px;font-weight:600;margin-bottom:3px}
.tc-badge.buy{background:var(--green-light);color:var(--green)}
.tc-badge.sell{background:var(--red-light);color:var(--red)}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text-4);
         font-size:13px;padding:2px;margin-left:4px}
.del-btn:hover{color:var(--red)}

/* ── 統計 ── */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.stat-box{background:var(--bg);border:1px solid var(--border-light);
          border-radius:var(--radius-sm);padding:10px 12px;text-align:center}
.stat-val{font-size:22px;font-weight:700}
.stat-lbl{font-size:10px;color:var(--text-3);margin-top:2px}

/* ── 回測 ── */
.bt-summary{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:10px}
.bt-box{border:1px solid var(--border-light);border-radius:var(--radius-sm);padding:8px 10px}
.bt-lbl{font-size:10px;color:var(--text-3)}
.bt-val{font-size:16px;font-weight:700;margin-top:2px}
.bt-trade{background:var(--bg);border-radius:var(--radius-sm);
          padding:8px 10px;margin-bottom:5px;font-size:12px}
.bt-win{border-left:2px solid var(--green)}
.bt-loss{border-left:2px solid var(--red)}
.equity-wrap{height:160px;position:relative;margin-bottom:8px}
.chk-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:6px 0}
.chk-lbl{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer}

/* ── 通用 ── */
.alert{padding:8px 12px;border-radius:var(--radius-sm);font-size:12px;margin-bottom:8px}
.alert.ok{background:var(--green-light);color:var(--green)}
.alert.err{background:var(--red-light);color:var(--red)}
.alert.warn{background:var(--yellow-light);color:var(--yellow-text)}
.empty{text-align:center;padding:30px 16px;color:var(--text-3);font-size:13px}
.empty-icon{font-size:28px;display:block;margin-bottom:6px}
.btn-run{width:100%;padding:10px;font-size:13px;font-weight:600;
         border:none;border-radius:var(--radius-sm);cursor:pointer;
         background:var(--text);color:#fff;margin-top:8px}
.card{background:var(--card);border:1px solid var(--border);
      border-radius:var(--radius);padding:12px 14px;margin-bottom:10px}
.card-title{font-size:11px;font-weight:600;color:var(--text-3);
            text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}
.filter-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.btn-sm{padding:5px 10px;font-size:11px;border:1px solid var(--border);
        border-radius:var(--radius-sm);cursor:pointer;background:var(--bg);color:var(--text-2)}
</style>
</head>
<body>

<!-- 頂部 -->
<div class="topbar">
  <h1>📒 交易簿</h1>
  <a href="/">← 回掃描器</a>
</div>

<!-- 主體：左右各半 -->
<div class="main-area">

  <!-- 左半：個股資訊 -->
  <div class="half">
    <div class="half-title">📊 個股資訊</div>
    <div class="half-body" id="siBody">
      <div class="si-empty">
        <span class="si-empty-icon">🔍</span>
        在右側輸入股票代號<br>自動載入資訊
      </div>
    </div>
  </div>

  <!-- 右半：下單表單 -->
  <div class="half">
    <div class="half-title">📝 模擬下單</div>
    <div class="half-body">
      <!-- Token 狀態列 -->
      <div id="tokenBar" style="padding:6px 10px;border-radius:var(--radius-sm);font-size:11px;margin-bottom:10px;background:var(--yellow-light);color:var(--yellow-text)">
        ⚠️ 未偵測到 Token，請先至掃描器驗證並勾選「記住 Token」
      </div>
      <div id="alertOrder" style="display:none"></div>
      <div class="order-seg">
        <button class="oseg active" onclick="setAction('buy',this)">買入</button>
        <button class="oseg" onclick="setAction('sell',this)">賣出</button>
      </div>
      <div class="form-row">
        <div class="ff" style="position:relative">
          <label>股票代號</label>
          <input id="m-code" type="text" placeholder="輸入代號或名稱搜尋"
            autocomplete="off" maxlength="10"
            oninput="onCodeInput(this.value)"
            onkeydown="onCodeKeydown(event)">
          <div id="stockDropdown" style="display:none;position:absolute;top:100%;left:0;right:0;
            background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);
            box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:100;max-height:200px;overflow-y:auto">
          </div>
        </div>
        <div class="ff">
          <label>名稱</label>
          <input id="m-name" type="text" placeholder="自動填入" readonly
            style="background:var(--bg);color:var(--text-2)">
        </div>
      </div>

      <!-- 快速價格 -->
      <div class="price-sc-wrap">
        <div class="price-sc-label">快速填入價格</div>
        <div class="price-sc-row">
          <button class="psc" onclick="setPx('close')">
            <div class="psc-lbl">收盤</div>
            <div class="psc-val" id="sc-close">—</div>
          </button>
          <button class="psc" onclick="setPx('open')">
            <div class="psc-lbl">開盤</div>
            <div class="psc-val" id="sc-open">—</div>
          </button>
          <button class="psc" onclick="setPx('high')">
            <div class="psc-lbl">最高</div>
            <div class="psc-val" id="sc-high">—</div>
          </button>
          <button class="psc" onclick="setPx('low')">
            <div class="psc-lbl">最低</div>
            <div class="psc-val" id="sc-low">—</div>
          </button>
        </div>
      </div>

      <div class="form-row">
        <div class="ff">
          <label>成交價格（元）</label>
          <input id="m-price" type="number" placeholder="0.00" step="0.01" min="0" oninput="previewFee()">
        </div>
        <div class="ff">
          <label>張數</label>
          <input id="m-shares" type="number" value="1" min="1" oninput="previewFee()">
        </div>
      </div>
      <div class="form-row">
        <div class="ff">
          <label>交易日期</label>
          <input id="m-date" type="date">
        </div>
        <div class="ff">
          <label>成交時間（精確到秒）</label>
          <input id="m-time" type="time" step="1" placeholder="09:30:00">
        </div>
      </div>
      <div class="form-row">
        <div class="ff">
          <label>手續費折扣（預設6折）</label>
          <select id="m-fee-discount" onchange="previewFee()">
            <option value="1.0">無折扣（1折）</option>
            <option value="0.8">8折</option>
            <option value="0.6" selected>6折（常見網路券商）</option>
            <option value="0.5">5折</option>
            <option value="0.38">3.8折</option>
            <option value="0.28">2.8折</option>
          </select>
        </div>
        <div class="ff" id="close-id-wrap" style="display:none">
          <label>對應買入單</label>
          <select id="m-close-id"><option value="">— 選擇 —</option></select>
        </div>
      </div>
      <div class="form-row" id="daytrade-wrap" style="display:none">
        <div class="ff">
          <label style="display:flex;align-items:center;gap:6px">
            <input type="checkbox" id="m-daytrade" onchange="previewFee()">
            當沖（賣出稅率 0.15%，減半）
          </label>
        </div>
      </div>
      <div class="form-row">
        <div class="ff">
          <label>備注（訊號/理由）</label>
          <input id="m-note" type="text" placeholder="例：MACD金叉 + 外資買超">
        </div>
      </div>
      <div id="fee-preview" class="fee-box" style="display:none"></div>
    </div><!-- end half-body -->
    <div class="half-footer">
      <button class="btn-order btn-buy" id="orderBtn" onclick="submitTrade()">確認買入</button>
    </div>
  </div><!-- end right half -->
    </div>
  </div>
</div>

<!-- 底部導覽 -->
<div class="bottom-nav">
  <button class="bnav" id="bnav-trades" onclick="openDrawer('trades',this)">
    <span class="bnav-icon">📋</span>交易記錄
  </button>
  <button class="bnav" id="bnav-backtest" onclick="openDrawer('backtest',this)">
    <span class="bnav-icon">🔬</span>歷史回測
  </button>
  <button class="bnav" id="bnav-stats" onclick="openDrawer('stats',this)">
    <span class="bnav-icon">📊</span>績效統計
  </button>
</div>

<!-- 抽屜：交易記錄 -->
<div class="drawer" id="drawer-trades">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <div class="drawer-title">📋 交易記錄</div>
    <button class="drawer-close" onclick="closeDrawer('trades')">✕</button>
  </div>
  <div class="drawer-body">
    <div class="filter-row">
      <span style="font-size:12px;font-weight:600;color:var(--text-2)">所有交易</span>
      <select id="filterStatus" onchange="renderTrades()" class="btn-sm">
        <option value="all">全部</option>
        <option value="open">持倉中</option>
        <option value="closed">已平倉</option>
        <option value="backtest">回測</option>
      </select>
    </div>
    <div id="tradesList"></div>
  </div>
</div>

<!-- 抽屜：歷史回測 -->
<div class="drawer" id="drawer-backtest">
  <div class="drawer-handle"></div>
  <div class="drawer-header">
    <div class="drawer-title">🔬 歷史回測</div>
    <button class="drawer-close" onclick="closeDrawer('backtest')">✕</button>
  </div>
  <div class="drawer-body">
    <div class="card">
      <div class="card-title">回測設定</div>
      <div id="alertBt" style="display:none"></div>

      <!-- 基本設定 -->
      <div class="form-row">
        <div class="ff"><label>股票代號</label><input id="bt-code" type="text" placeholder="例：2330"></div>
        <div class="ff"><label>張數</label><input id="bt-shares" type="number" value="1" min="1"></div>
      </div>
      <div class="form-row">
        <div class="ff"><label>開始日期</label><input id="bt-start" type="date"></div>
        <div class="ff"><label>結束日期</label><input id="bt-end" type="date"></div>
      </div>

      <!-- 進場條件 -->
      <div style="margin-top:10px">
        <div style="font-size:11px;font-weight:600;color:var(--text-2);margin-bottom:5px">📥 進場條件</div>
        <div style="font-size:10px;color:var(--text-3);margin-bottom:7px;line-height:1.7">
          <span style="background:var(--green-light);color:var(--green);padding:1px 6px;border-radius:4px">必須</span> 必須成立 ／
          <span style="background:#e8f4fd;color:#1a6a9a;padding:1px 6px;border-radius:4px">選用</span> 計分（達最少項數）／
          <span style="background:var(--red-light);color:var(--red);padding:1px 6px;border-radius:4px">排除</span> 成立時拒絕進場
        </div>
        <table style="width:100%;border-collapse:collapse;font-size:11px">
          <thead><tr style="background:var(--bg)">
            <th style="padding:5px 6px;text-align:left;color:var(--text-3);font-weight:500">指標</th>
            <th style="padding:5px 2px;text-align:center;width:44px">必須</th>
            <th style="padding:5px 2px;text-align:center;width:44px">選用</th>
            <th style="padding:5px 2px;text-align:center;width:44px">排除</th>
            <th style="padding:5px 2px;text-align:center;width:44px">忽略</th>
          </tr></thead>
          <tbody id="entryRuleTable"></tbody>
        </table>
        <div class="form-row" style="margin-top:8px">
          <div class="ff">
            <label>選用指標最少符合幾項才進場</label>
            <input id="bt-min-optional" type="number" value="2" min="0" max="8">
          </div>

<script>
const TOKEN_KEY = 'finmind_token_v1';
let currentAction = 'buy';

// ── 初始化 ────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {

['trades','backtest','stats'].forEach(id => {

// ── 代號輸入 ─────────────────────────────────────────

// ── 股票名稱字典（前端搜尋用）────────────────────────

  '2492':'華新科','4966':'譜瑞-KY','4763':'材料-KY','6415':'矽力-KY','5871':'中租-KY',
};

let dropdownIdx = -1;

function onCodeInput(val) {
  const q = val.trim();
  dropdownIdx = -1;

  if (currentAction === 'sell') populateBuyOptions();

  if (q.length === 0) {
    hideDropdown(); return;
  }

  // 搜尋：代號前綴 OR 名稱包含
  const matches = Object.entries(STOCK_DICT).filter(([code, name]) =>
    code.startsWith(q) || name.includes(q)
  ).slice(0, 8);

  if (matches.length === 0) {
    hideDropdown();
    // 若已是完整4位代號，直接嘗試載入
    if (q.length >= 4) triggerLoad(q);
    return;
  }

  showDropdown(matches);
}

function showDropdown(matches) {
  const dd = document.getElementById('stockDropdown');
  dd.innerHTML = matches.map(([code, name], i) => `
    <div class="dd-item" data-code="${code}" data-name="${name}"
         onclick="selectStock('${code}','${name}')"
         style="padding:9px 12px;cursor:pointer;display:flex;justify-content:space-between;
                align-items:center;border-bottom:1px solid var(--border-light);font-size:13px">
      <span><b>${code}</b> <span style="color:var(--text-2)">${name}</span></span>
      <span style="font-size:10px;color:var(--text-3)">點選</span>
    </div>`).join('');
  dd.style.display = 'block';
}

function hideDropdown() {
  const dd = document.getElementById('stockDropdown');
  if (dd) dd.style.display = 'none';
  dropdownIdx = -1;
}

function onCodeKeydown(e) {
  const dd = document.getElementById('stockDropdown');
  const items = dd.querySelectorAll('.dd-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    dropdownIdx = Math.min(dropdownIdx + 1, items.length - 1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    dropdownIdx = Math.max(dropdownIdx - 1, 0);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (dropdownIdx >= 0 && items[dropdownIdx]) {
      const item = items[dropdownIdx];
      selectStock(item.dataset.code, item.dataset.name);
    } else {
      hideDropdown();
      triggerLoad(document.getElementById('m-code').value.trim());
    }
    return;
  } else if (e.key === 'Escape') {
    hideDropdown(); return;
  } else { return; }
  // 更新高亮
  items.forEach((el, i) => {
    el.style.background = i === dropdownIdx ? 'var(--green-light)' : '';
  });
}

function selectStock(code, name) {
  document.getElementById('m-code').value = code;
  document.getElementById('m-name').value = name;
  hideDropdown();
  triggerLoad(code);
}

let loadTimer = null;
function triggerLoad(code) {
  clearTimeout(loadTimer);
  if (code.length >= 4) {
    loadTimer = setTimeout(() => loadStockInfo(code), 300);
  }
}

// 點擊其他地方關閉下拉

async function loadStockInfo(code) {
  const token = getToken();
  if (!token) {
    document.getElementById('siBody').innerHTML = `
      <div class="si-empty">
        <span class="si-empty-icon">🔑</span>
        未偵測到 Token<br>
        <span style="font-size:11px">請先至掃描器勾選「記住 Token」後驗證</span>
      </div>`;
    return;
  }
  // 自動填入股票名稱（字典優先）
  const nameEl = document.getElementById('m-name');
  if ((!nameEl.value || nameEl.value === '自動填入') && STOCK_DICT[code]) {
    nameEl.value = STOCK_DICT[code];
  }
  // 顯示載入中
  document.getElementById('siBody').innerHTML =
    `<div class="si-empty"><span style="font-size:28px">⏳</span><br>載入 ${code} 資料中...</div>`;
  try {
    const r = await fetch(`/api/chart/${code}?token=${encodeURIComponent(token)}`);
    if (!r.ok) return;
    const d = await r.json();
    if (!d.close || !d.close.length) return;

    const n   = d.close.length - 1;
    const px  = d.close[n];
    const prv = d.close[n-1] || px;
    const chg = ((px-prv)/prv*100).toFixed(2);
    const hi  = d.high?.[n];
    const lo  = d.low?.[n];
    const op  = d.open?.[n];
    const vol = d.vol?.[n] || 0;
    const volAvg = (d.vol||[]).slice(-20).reduce((a,b)=>a+(b||0),0)/20;
    refPrices = { close:px, open:op, high:hi, low:lo };

    const closes = (d.close||[]).filter(v=>v!=null);
    const ma5    = avg(closes.slice(-5));
    const ma10   = avg(closes.slice(-10));
    const ma20   = avg(closes.slice(-20));
    const bb_std = stdDev(closes.slice(-20));
    const bb_up  = ma20 + 2*bb_std;
    const bb_lo  = ma20 - 2*bb_std;
    const bb_pos = bb_up > bb_lo ? Math.round((px-bb_lo)/(bb_up-bb_lo)*100) : 50;
    const rsiVal = calcRSI(closes);
    const volRatio = volAvg > 0 ? (vol/volAvg).toFixed(1) : '—';
    const macdArr= calcMACD(closes);
    const macdNow= macdArr[macdArr.length-1];

    const sigs = {
      '價格突破': px >= Math.max(...(d.high||[]).slice(-20).filter(v=>v)) * 0.97,
      '量能放大': parseFloat(volRatio) >= 1.5,
      'MACD正值': macdNow > 0,
      'RSI強勢':  rsiVal>=55 && rsiVal<=75,
      '均線多頭': ma5>ma10 && ma10>ma20,
    };

    // 快速價格按鈕
    document.getElementById('sc-close').textContent = px?.toFixed(2) || '—';
    document.getElementById('sc-open').textContent  = op?.toFixed(2) || '—';
    document.getElementById('sc-high').textContent  = hi?.toFixed(2) || '—';
    document.getElementById('sc-low').textContent   = lo?.toFixed(2) || '—';

    // 自動填入收盤價
    if (!document.getElementById('m-price').value) {
      document.getElementById('m-price').value = px.toFixed(2);
      previewFee();
    }

    // 左側個股資訊
    document.getElementById('siBody').innerHTML = `
      <div class="si-header">
        <div>
          <div class="si-name">${code}</div>
          <div class="si-date">${d.dates?.[n] || ''}</div>
        </div>
        <div class="si-price-wrap">
          <div class="si-price">${px.toFixed(2)}</div>
          <div class="si-chg ${chg>=0?'up':'dn'}">${chg>=0?'+':''}${chg}%</div>
        </div>
      </div>
      <div class="ohlc-row">
        <div class="ohlc-item"><div class="ohlc-lbl">開盤</div><div class="ohlc-val">${op?.toFixed(2)||'—'}</div></div>
        <div class="ohlc-item"><div class="ohlc-lbl">最高</div><div class="ohlc-val up">${hi?.toFixed(2)||'—'}</div></div>
        <div class="ohlc-item"><div class="ohlc-lbl">最低</div><div class="ohlc-val dn">${lo?.toFixed(2)||'—'}</div></div>
        <div class="ohlc-item"><div class="ohlc-lbl">量比</div><div class="ohlc-val">${volRatio}x</div></div>
      </div>
      <div class="si-grid">
        <div class="si-item"><div class="si-lbl">RSI (14)</div>
          <div class="si-val ${rsiVal>=55&&rsiVal<=75?'up':rsiVal>75?'dn':''}">${rsiVal.toFixed(1)}</div></div>
        <div class="si-item"><div class="si-lbl">MACD 柱狀</div>
          <div class="si-val ${macdNow>0?'up':'dn'}">${macdNow>0?'+':''}${macdNow.toFixed(3)}</div></div>
        <div class="si-item"><div class="si-lbl">MA5/10/20</div>
          <div class="si-val" style="font-size:11px">${ma5.toFixed(1)} / ${ma10.toFixed(1)} / ${ma20.toFixed(1)}</div></div>
        <div class="si-item"><div class="si-lbl">布林位置</div>
          <div class="si-val ${bb_pos>=70?'up':bb_pos<=30?'dn':''}">${bb_pos}%</div></div>
      </div>
      <div class="sig-row">
        ${Object.entries(sigs).map(([k,v])=>
          `<span class="sig-chip ${v?'on':'off'}">${v?'✅':'⬜'} ${k}</span>`).join('')}
      </div>
      <div style="font-size:10px;color:var(--text-3);margin-bottom:4px">資料為最近一個交易日</div>
      <div class="intraday-section">
        <div class="intraday-header">
          <span class="intraday-title">📈 盤中走勢（分鐘線）</span>
          <span class="intraday-meta" id="intraday-meta">載入中...</span>
        </div>
        <div id="intraday-chart-wrap" class="intraday-chart-wrap">
          <div class="intraday-loading">載入中...</div>
        </div>
        <div id="intraday-vol-wrap" class="intraday-vol-wrap"></div>
      </div>`;

    // 載入盤中走勢（非同步，不阻塞主資訊顯示）
    loadIntraday(code);
  } catch(e) {
    console.warn('[si]', e.message);
    const siBody = document.getElementById('siBody');
    if (siBody) siBody.innerHTML = `
      <div class="si-empty">
        <span class="si-empty-icon">⚠️</span>
        載入失敗：${e.message}<br>
        <span style="font-size:11px">請確認代號正確且 Token 有效</span>
      </div>`;
  }
}

let intradayCharts = [];

async function loadIntraday(code) {
  const token = getToken();
  if (!token) return;
  try {
    const resp = await fetch(`/api/intraday/${code}?token=${encodeURIComponent(token)}`);
    if (!resp.ok) throw new Error('API ' + resp.status);
    const d = await resp.json();

    const metaEl = document.getElementById('intraday-meta');
    const wrapEl = document.getElementById('intraday-chart-wrap');
    const volEl  = document.getElementById('intraday-vol-wrap');
    if (!metaEl || !wrapEl) return;

    if (!d.times || !d.times.length) {
      metaEl.textContent = d.msg || '今日尚無資料';
      wrapEl.innerHTML = '<div class="intraday-loading">非交易日或盤前，無分鐘資料</div>';
      return;
    }

    metaEl.textContent = `${d.date} ${d.status || ''} · ${d.times.length} 筆`;

    // 清除舊圖
    intradayCharts.forEach(c => { try { c.remove(); } catch(e){} });
    intradayCharts = [];

    // 後端已回傳台灣時間（UTC+8）的 HH:MM
    // LightweightCharts 以 UTC 顯示，把台灣時間直接當 UTC 傳入，圖表顯示正確
    const toT = (hhmm) => {
      const [h, m] = hhmm.split(':').map(Number);
      const dt = new Date(`${d.date}T${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:00Z`);
      return Math.floor(dt.getTime() / 1000);
    };

    const LWC  = typeof LightweightCharts !== 'undefined' ? LightweightCharts : null;
    if (!LWC) {
      wrapEl.innerHTML = '<div class="intraday-loading">圖表庫載入中，請稍後重試</div>';
      return;
    }

    // 價格 K 線圖
    wrapEl.innerHTML = '';
    const pChart = LWC.createChart(wrapEl, {
      width:  wrapEl.clientWidth || 300,
      height: 130,
      layout: { background: { color: '#fff' }, textColor: '#888' },
      grid:   { vertLines: { color: '#f0f0ee' }, horzLines: { color: '#f0f0ee' } },
      timeScale: {
        borderColor: '#e8e8e6',
        timeVisible: true,
        secondsVisible: false,
      },
      rightPriceScale: { borderColor: '#e8e8e6' },
      handleScroll: true,
      handleScale:  true,
    });

    const candle = pChart.addCandlestickSeries({
      upColor:         '#e74c3c', downColor:      '#2ecc71',
      borderUpColor:   '#e74c3c', borderDownColor:'#2ecc71',
      wickUpColor:     '#e74c3c', wickDownColor:  '#2ecc71',
    });
    candle.setData(d.times.map((t, i) => ({
      time:  toT(t),
      open:  d.open[i]  || d.close[i],
      high:  d.high[i]  || d.close[i],
      low:   d.low[i]   || d.close[i],
      close: d.close[i],
    })).filter(x => x.close != null));

    // VWAP 線
    if (d.vwap && d.vwap.length) {
      const vwapSeries = pChart.addLineSeries({
        color: '#f39c12', lineWidth: 1.5,
        priceLineVisible: false, lastValueVisible: true, title: 'VWAP',
      });
      vwapSeries.setData(
        d.times.map((t, i) => d.vwap[i] != null ? { time: toT(t), value: d.vwap[i] } : null)
               .filter(Boolean)
      );
    }
    pChart.timeScale().fitContent();
    intradayCharts.push(pChart);

    // 成交量圖
    volEl.innerHTML = '';
    const vChart = LWC.createChart(volEl, {
      width:  volEl.clientWidth || 300,
      height: 50,
      layout: { background: { color: '#fff' }, textColor: '#888' },
      grid:   { vertLines: { color: '#f0f0ee' }, horzLines: { color: '#f0f0ee' } },
      timeScale: { visible: false },
      rightPriceScale: { borderColor: '#e8e8e6' },
    });
    const validVols = d.vol.filter(v => v > 0);
    const avgVol    = validVols.length ? validVols.reduce((a,b)=>a+b,0)/validVols.length : 1;
    const volSeries = vChart.addHistogramSeries({ priceFormat: { type: 'volume' } });
    volSeries.setData(
      d.times.map((t, i) => d.vol[i] != null ? {
        time:  toT(t),
        value: d.vol[i],
        color: d.vol[i] >= avgVol ? 'rgba(231,76,60,0.7)' : 'rgba(120,120,120,0.35)',
      } : null).filter(Boolean)
    );
    vChart.timeScale().fitContent();
    intradayCharts.push(vChart);

    // ── 同步兩張圖表時間軸 ────────────────────────────
    let syncing = false;
    pChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncing || !range) return;
      syncing = true;
      vChart.timeScale().setVisibleLogicalRange(range);
      syncing = false;
    });
    vChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncing || !range) return;
      syncing = true;
      pChart.timeScale().setVisibleLogicalRange(range);
      syncing = false;
    });

  } catch(e) {
    const metaEl = document.getElementById('intraday-meta');
    const wrapEl = document.getElementById('intraday-chart-wrap');
    if (metaEl) metaEl.textContent = '載入失敗';
    if (wrapEl) wrapEl.innerHTML = `<div class="intraday-loading" style="color:var(--red)">⚠️ ${e.message}</div>`;
  }
}

function setPx(type) {
  const p = refPrices[type];
  if (p != null) { document.getElementById('m-price').value = p.toFixed(2); previewFee(); }
}

// ── 技術指標（前端輕量）────────────────────────────────
function avg(arr) { return arr.reduce((a,b)=>a+(b||0),0)/(arr.length||1); }
function stdDev(arr) {
  const m = avg(arr);
  return Math.sqrt(arr.reduce((a,b)=>a+(b-m)**2,0)/(arr.length||1));
}
function calcRSI(closes, period=14) {
  if (closes.length < period+1) return 50;
  let g=0, l=0;
  for (let i=closes.length-period; i<closes.length; i++) {
    const d = closes[i]-closes[i-1]; if(d>0) g+=d; else l-=d;
  }
  return 100 - 100/(1+(g/period)/((l/period)||1e-9));
}
function calcMACD(closes) {
  const ema = (data,span) => {
    const k=2/(span+1); const o=[data[0]||0];
    for (let i=1;i<data.length;i++) o.push(data[i]*k+o[i-1]*(1-k));
    return o;
  };
  const e12=ema(closes,12), e26=ema(closes,26);
  const ml=e12.map((v,i)=>v-e26[i]);
  const sig=ema(ml,9);
  return ml.map((v,i)=>v-sig[i]);
}

// ── 下單 ──────────────────────────────────────────────
function setAction(action, btn) {
  currentAction = action;
  document.querySelectorAll('.oseg').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const ob = document.getElementById('orderBtn');
  ob.textContent = action==='buy' ? '確認買入' : '確認賣出';
  ob.className = `btn-order btn-${action}`;
  document.getElementById('close-id-wrap').style.display   = action==='sell' ? 'flex':'none';
  document.getElementById('daytrade-wrap').style.display    = action==='sell' ? 'block':'none';
  if (action==='sell') populateBuyOptions();
  previewFee();
}

function populateBuyOptions() {
  const code = document.getElementById('m-code').value.trim();
  const sel  = document.getElementById('m-close-id');
  const open = allTrades.filter(t=>t.action==='buy'&&t.status==='open'&&(!code||t.code===code));
  sel.innerHTML = '<option value="">— 選擇買入單 —</option>'+
    open.map(t=>`<option value="${t.id}">[${t.date}] ${t.code} @${t.price} ×${t.shares}張</option>`).join('');
}

function getFeeParams() {
  const discount  = parseFloat(document.getElementById('m-fee-discount').value) || 0.6;
  const isDaytrade= currentAction==='sell' && document.getElementById('m-daytrade')?.checked;
  const feeRate   = 0.001425 * discount;
  const taxRate   = isDaytrade ? 0.0015 : 0.003;
  return { feeRate, taxRate, isDaytrade, discount };
}

function previewFee() {
  const price  = parseFloat(document.getElementById('m-price').value)||0;
  const shares = parseInt(document.getElementById('m-shares').value)||0;
  const isSell = currentAction==='sell';
  const el = document.getElementById('fee-preview');
  if (!price||!shares) { el.style.display='none'; return; }
  const { feeRate, taxRate, isDaytrade, discount } = getFeeParams();
  const amt = price*shares*1000;
  const fee = Math.max(Math.round(amt*feeRate), 20);
  const tax = isSell ? Math.round(amt*taxRate) : 0;
  const net = isSell ? amt-fee-tax : amt+fee;
  el.style.display='block';
  const discountLabel = discount < 1 ? `（${(discount*10).toFixed(1)}折）` : '';
  el.innerHTML = `成交 <b>${amt.toLocaleString()}</b> ／ 手續費 <b>${fee.toLocaleString()}</b>${discountLabel}`+
    (isSell?` ／ 交易稅 <b>${tax.toLocaleString()}</b>${isDaytrade?' <span style="color:var(--green)">[當沖減半]</span>':''}`:'')+
    ` ／ 實付 <b>${net.toLocaleString()}</b> 元`;
}

async function submitTrade() {
  const code      = document.getElementById('m-code').value.trim();
  const name      = document.getElementById('m-name').value.trim()||code;
  const price     = parseFloat(document.getElementById('m-price').value);
  const shares    = parseInt(document.getElementById('m-shares').value);
  const date      = document.getElementById('m-date').value;
  const time      = document.getElementById('m-time').value || '';
  const note      = document.getElementById('m-note').value.trim();
  const closeId   = parseInt(document.getElementById('m-close-id').value)||null;
  const discount  = parseFloat(document.getElementById('m-fee-discount').value)||0.6;
  const isDaytrade= currentAction==='sell' && document.getElementById('m-daytrade')?.checked;
  if (!code||!price||!shares||!date) {
    showAlert('alertOrder','請填寫代號、價格、張數、日期','err'); return;
  }
  const btn = document.getElementById('orderBtn');
  btn.disabled = true;
  try {
    const datetime = time ? `${date} ${time}` : date;
    const r = await fetch('/api/journal/trade', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        code, name, action: currentAction, price, shares,
        date: datetime,   // 含時間的完整字串
        note, trigger:'manual',
        close_id: currentAction==='sell' ? closeId : null,
        fee_discount: discount,
        is_daytrade:  isDaytrade,
      })
    });
    if (!r.ok) throw new Error((await r.json()).detail||'API錯誤');
    const t = await r.json();
    const msg = `✅ ${currentAction==='buy'?'買入':'賣出'} ${code} ${shares}張 @${price} ${time}`+
      (isDaytrade?' [當沖]':'')+
      (t.pnl!=null?` ／ 損益 ${t.pnl>=0?'+':''}${Math.round(t.pnl).toLocaleString()} 元（${t.pnl_pct}%）`:'');
    showAlert('alertOrder', msg, t.pnl!=null && t.pnl<0?'err':'ok');
    // 更新時間為當前時間
    document.getElementById('m-time').value = new Date().toTimeString().slice(0,8);
    document.getElementById('m-price').value='';
    document.getElementById('m-note').value='';
    document.getElementById('fee-preview').style.display='none';
    if (document.getElementById('m-daytrade')) document.getElementById('m-daytrade').checked=false;
    await loadAllTrades();
    renderTrades();
  } catch(e) {
    showAlert('alertOrder','提交失敗：'+e.message,'err');
  } finally { btn.disabled=false; }
}

// ── 交易記錄 ─────────────────────────────────────────
async function loadAllTrades() {
  try {
    const r = await fetch('/api/journal/trades');
    if (!r.ok) return;
    const d = await r.json();
    allTrades = (d.trades||[]).slice().reverse();
  } catch(e) { allTrades=[]; }
}

function renderTrades() {
  const filter = document.getElementById('filterStatus').value;
  let list = allTrades;
  if (filter==='open')     list=list.filter(t=>t.status==='open'&&t.trigger!=='backtest');
  if (filter==='closed')   list=list.filter(t=>t.status==='closed'&&t.trigger!=='backtest');
  if (filter==='backtest') list=list.filter(t=>t.trigger==='backtest');
  const c = document.getElementById('tradesList');
  if (!list.length) { c.innerHTML='<div class="empty"><span class="empty-icon">📋</span>尚無記錄</div>'; return; }
  c.innerHTML = list.map(t=>{
    const isBuy=t.action==='buy';
    const isWin=t.pnl>0;
    const cls = t.trigger==='backtest'?'tc-bt' : isBuy?'tc-buy' : isWin?'tc-sell-win':'tc-sell-loss';
    const sigs = (t.signals||[]).map(s=>`<span style="font-size:9px;background:var(--green-light);color:var(--green);padding:1px 5px;border-radius:4px;margin-right:2px">${s}</span>`).join('');
    return `<div class="trade-card ${cls}">
      <div class="tc-top">
        <div>
          <span class="tc-badge ${isBuy?'buy':'sell'}">${isBuy?'買入':'賣出'}</span>
          <div class="tc-name">${t.code} ${t.name||''}</div>
          <div class="tc-meta">${t.date}${t.trigger==='backtest'?' ・回測':''}${t.exit_reason?' ・'+t.exit_reason:''}</div>
          ${sigs?`<div style="margin-top:3px">${sigs}</div>`:''}
          ${t.note?`<div style="font-size:10px;color:var(--text-3);margin-top:2px">📝 ${t.note}</div>`:''}
        </div>
        <div>
          <div class="tc-price">${parseFloat(t.price).toLocaleString()}元 ×${t.shares}張</div>
          ${t.pnl!=null?`<div class="tc-pnl ${t.pnl>=0?'pos':'neg'}">${t.pnl>=0?'+':''}${Math.round(t.pnl).toLocaleString()} (${t.pnl_pct}%)</div>`:''}
          <button class="del-btn" onclick="event.stopPropagation();deleteTrade(${t.id})" title="刪除">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function deleteTrade(id) {
  if (!confirm('確定刪除這筆交易記錄？')) return;
  try {
    const r = await fetch(`/api/journal/trade/${id}`, { method: 'DELETE' });
    if (!r.ok) throw new Error('刪除失敗');
    await loadAllTrades();
    renderTrades();
    loadStats();
  } catch(e) {
    alert('刪除失敗：' + e.message);
  }
}

// ── 指標規則表 ────────────────────────────────────────
const INDICATOR_LABELS = {
  price_breakout: '價格突破（近20日高點）',
  volume_surge:   '量能放大（>1.5x均量）',
  macd_positive:  'MACD 柱狀正值',
  macd_golden:    'MACD 金叉（剛轉正）',
  rsi_strong:     'RSI 強勢（55–75）',
  ma_bullish:     '均線多頭排列',
  bb_upper:       '布林上軌（>85%，偏貴）',
  bb_lower:       '布林下軌（<15%，偏便宜）',
};
const RULE_DEFAULTS = {
  price_breakout: 'optional',
  volume_surge:   'optional',
  macd_positive:  'must',
  macd_golden:    'optional',
  rsi_strong:     'optional',
  ma_bullish:     'must',
  bb_upper:       'ignore',
  bb_lower:       'ignore',
};

function initEntryRuleTable() {
  const tbody = document.getElementById('entryRuleTable');
  if (!tbody) return;
  tbody.innerHTML = Object.entries(INDICATOR_LABELS).map(([key, label]) => {
    const def = RULE_DEFAULTS[key];
    return `<tr style="border-bottom:1px solid var(--border-light)">
      <td style="padding:5px 6px;font-size:11px">${label}</td>
      ${['must','optional','exclude','ignore'].map(v => `
        <td style="text-align:center;padding:4px 2px">
          <input type="radio" name="rule_${key}" value="${v}" ${def===v?'checked':''} style="cursor:pointer">
        </td>`).join('')}
    </tr>`;
  }).join('');
}

function getEntryRules() {
  const result = {};
  Object.keys(INDICATOR_LABELS).forEach(key => {
    const checked = document.querySelector(`input[name="rule_${key}"]:checked`);
    result[key] = checked ? checked.value : 'ignore';
  });
  return result;
}
async function runBacktest() {
  const token = getToken();
  if (!token) { showAlert('alertBt','請先在掃描器登入 Token','err'); return; }
  const code  = document.getElementById('bt-code').value.trim();
  const start = document.getElementById('bt-start').value;
  const end   = document.getElementById('bt-end').value;
  if (!code||!start||!end) { showAlert('alertBt','請填寫代號和日期','err'); return; }
  const btn = document.getElementById('btBtn');
  btn.disabled=true; btn.textContent='回測中...';
  document.getElementById('btResult').style.display='none';
  try {
    const body = {
      token, code,
      start_date:   start,
      end_date:     end,
      shares:       parseInt(document.getElementById('bt-shares').value)||1,
      min_optional: parseInt(document.getElementById('bt-min-optional').value)||2,
      entry:        getEntryRules(),
      exit_rule: {
        stop_loss:         parseFloat(document.getElementById('bt-sl').value)||7,
        take_profit:       parseFloat(document.getElementById('bt-tp').value)||15,
        max_hold_days:     parseInt(document.getElementById('bt-maxdays').value)||0,
        exit_bad_signals:  parseInt(document.getElementById('bt-bad-sigs').value)||0,
        bad_signal_window: parseInt(document.getElementById('bt-bad-window').value)||1,
      },
      cooldown_days: parseInt(document.getElementById('bt-cooldown').value)||0,
    };
    const r = await fetch('/api/backtest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if (!r.ok){const e=await r.json();throw new Error(e.detail||'錯誤');}
    const d = await r.json();
    renderBtResult(d);
    if (document.getElementById('bt-save').checked && d.trades.length) {
      for (const t of d.trades) {
        await fetch('/api/journal/trade',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({code:t.code,name:t.code,action:t.type,price:t.price,
            shares:t.shares,date:t.date,trigger:'backtest',signals:t.signals||[],
            note:t.exit_reason||'',close_id:null})});
      }
      await loadAllTrades(); renderTrades();
      showAlert('alertBt',`✅ ${d.trades.length} 筆回測交易已存入`,'ok');
    }
  } catch(e) {
    showAlert('alertBt','回測失敗：'+e.message,'err');
  } finally { btn.disabled=false; btn.textContent='▶ 開始回測'; }
}

function renderBtResult(d) {
  document.getElementById('btTitle').textContent=`${d.code}（${d.start_date}～${d.end_date}）`;
  const pc=d.total_pnl>=0?'color:var(--green)':'color:var(--red)';
  const rr = d.rr_ratio || 0;
  document.getElementById('btSummary').innerHTML=[
    ['交易次數',    d.total_trades,  ''],
    ['勝率',        d.win_rate+'%',  d.win_rate>=50?'color:var(--green)':'color:var(--red)'],
    ['總損益',      (d.total_pnl>=0?'+':'')+d.total_pnl.toLocaleString()+'元', pc],
    ['盈虧比',      rr+'x',          rr>=1.5?'color:var(--green)':rr>0?'color:#e67e22':'color:var(--red)'],
    ['平均獲利',    '+'+(d.avg_win||0).toLocaleString()+'元', 'color:var(--green)'],
    ['平均虧損',    (d.avg_loss||0).toLocaleString()+'元',    'color:var(--red)'],
    ['平均持有',    d.avg_hold_days+'天', ''],
    ['最大獲利',    '+'+(d.max_win||0).toLocaleString()+'元', 'color:var(--green)'],
    ['最大虧損',    (d.max_loss||0).toLocaleString()+'元',    'color:var(--red)'],
    ['獲利次數',    d.wins,           'color:var(--green)'],
  ].map(([l,v,c])=>`<div class="bt-box"><div class="bt-lbl">${l}</div><div class="bt-val" style="${c}">${v}</div></div>`).join('');

  // 出場原因統計
  if (d.exit_reasons && Object.keys(d.exit_reasons).length) {
    const total = Object.values(d.exit_reasons).reduce((a,b)=>a+b,0);
    const exitHtml = Object.entries(d.exit_reasons)
      .sort((a,b)=>b[1]-a[1])
      .map(([reason, cnt])=>`
        <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border-light);font-size:12px">
          <span>${reason}</span>
          <span><b>${cnt}</b> 次（${Math.round(cnt/total*100)}%）</span>
        </div>`).join('');
    document.getElementById('btSummary').innerHTML +=
      `<div style="grid-column:1/-1;margin-top:6px">
        <div style="font-size:11px;font-weight:600;color:var(--text-3);margin-bottom:4px">出場原因分佈</div>
        ${exitHtml}
      </div>`;
  }

  const sells=d.trades.filter(t=>t.type==='sell');
  if (sells.length) {
    let cum=0;
    if (equityInst) equityInst.destroy();
    equityInst=new Chart(document.getElementById('equityChart').getContext('2d'),{
      type:'line',
      data:{labels:sells.map(t=>t.date),
            datasets:[{data:sells.map(t=>{cum+=t.pnl;return cum;}),
                       borderColor:cum>=0?'#1a7a4a':'#c0392b',borderWidth:1.5,
                       pointRadius:2,fill:true,
                       backgroundColor:cum>=0?'rgba(26,122,74,.08)':'rgba(192,57,43,.08)',
                       tension:.3}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
               scales:{x:{ticks:{font:{size:9},color:'#888'},grid:{display:false}},
                       y:{ticks:{font:{size:9},color:'#888',
                          callback:v=>v>=0?'+'+v.toLocaleString():v.toLocaleString()},
                          grid:{color:'rgba(0,0,0,.04)'}}}}});
  }
  document.getElementById('btTrades').innerHTML=!sells.length
    ?'<div class="empty"><span class="empty-icon">🔍</span>此區間無觸發訊號</div>'
    :sells.map(t=>`<div class="bt-trade ${t.pnl>0?'bt-win':'bt-loss'}">
        <div style="display:flex;justify-content:space-between">
          <div>買 ${t.buy_date} @${t.buy_price} → 賣 ${t.date} @${t.price}
            <span style="font-size:10px;color:var(--text-3);margin-left:4px">${t.exit_reason}</span>
          </div>
          <div style="font-weight:600;${t.pnl>0?'color:var(--green)':'color:var(--red)'}">
            ${t.pnl>=0?'+':''}${t.pnl.toLocaleString()} (${t.pnl_pct}%・${t.hold_days}天)
          </div>
        </div>
      </div>`).join('');
  document.getElementById('btResult').style.display='block';
}

// ── 績效統計 ─────────────────────────────────────────
async function loadStats() {
  try {
    const r=await fetch('/api/journal/stats');
    if (!r.ok) return;
    const s=await r.json();
    document.getElementById('st-total').textContent=s.total_trades;
    document.getElementById('st-wr').textContent=s.win_rate+'%';
    const pe=document.getElementById('st-pnl');
    pe.textContent=(s.total_pnl>=0?'+':'')+s.total_pnl.toLocaleString();
    pe.style.color=s.total_pnl>=0?'var(--green)':'var(--red)';
    document.getElementById('st-rr').textContent=s.rr_ratio+'x';
    document.getElementById('statsDetail').innerHTML=`
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px">
        <div style="padding:8px;background:var(--bg);border-radius:6px">獲利次數<br><strong style="color:var(--green)">${s.wins}次</strong></div>
        <div style="padding:8px;background:var(--bg);border-radius:6px">虧損次數<br><strong style="color:var(--red)">${s.losses}次</strong></div>
        <div style="padding:8px;background:var(--bg);border-radius:6px">平均獲利<br><strong style="color:var(--green)">+${s.avg_win.toLocaleString()}元</strong></div>
        <div style="padding:8px;background:var(--bg);border-radius:6px">平均虧損<br><strong style="color:var(--red)">${s.avg_loss.toLocaleString()}元</strong></div>
      </div>
      <div style="margin-top:8px;font-size:11px;color:var(--text-3)">盈虧比 ${s.rr_ratio}x：建議 ≥ 1.5x</div>`;
    const open=allTrades.filter(t=>t.status==='open'&&t.trigger!=='backtest');
    document.getElementById('openTrades').innerHTML=!open.length
      ?'<div style="font-size:13px;color:var(--text-3)">目前無持倉</div>'
      :open.map(t=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border-light);font-size:12px">
          <div><strong>${t.code} ${t.name||''}</strong><br><span style="color:var(--text-3)">${t.date} @${t.price} ×${t.shares}張</span></div>
          <div style="color:var(--text-3)">成本 ${Math.round(t.price*t.shares*1000+(t.fee||0)).toLocaleString()}元</div>
        </div>`).join('');
  } catch(e) { console.error('[stats]',e.message); }
}

// ── 工具 ─────────────────────────────────────────────
function showAlert(id, msg, type) {
  const el=document.getElementById(id);
  if (!el) return;
  el.style.display='block'; el.className='alert '+type; el.textContent=msg;
  setTimeout(()=>el.style.display='none', 5000);
}
